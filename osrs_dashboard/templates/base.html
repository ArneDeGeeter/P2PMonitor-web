<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}OSRS Dashboard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #1a1a2e; color: #e0e0e0; }
    .navbar { background: #16213e !important; border-bottom: 2px solid #c8a951; }
    .navbar-brand { color: #c8a951 !important; font-weight: bold; font-size: 1.3rem; }
    .card { background: #16213e; border: 1px solid #2a2a4a; }
    .card-header { background: #0f3460; border-bottom: 1px solid #2a2a4a; color: #c8a951; font-weight: 600; }
    .table { color: #e0e0e0; }
    .table thead th { background: #0f3460; color: #c8a951; border-color: #2a2a4a; }
    .table tbody tr:hover { background: #1f2f5a; }
    .table td, .table th { border-color: #2a2a4a; }
    .btn-osrs { background: #c8a951; border: none; color: #1a1a2e; font-weight: 600; }
    .btn-osrs:hover { background: #e0bf60; color: #1a1a2e; }
    .nav-tabs .nav-link { color: #a0a0c0; border-color: #2a2a4a; }
    .nav-tabs .nav-link.active { background: #0f3460; color: #c8a951; border-color: #2a2a4a #2a2a4a #0f3460; }
    .form-control, .form-select { background: #0f1a30; border-color: #2a2a4a; color: #e0e0e0; }
    .form-control:focus, .form-select:focus { background: #0f1a30; border-color: #c8a951; color: #e0e0e0; box-shadow: 0 0 0 0.2rem rgba(200,169,81,0.25); }
    .form-control::placeholder { color: #8888aa; opacity: 1; }
    .badge-xp { background: #1a5e1a; color: #7fff7f; font-size: 0.8em; padding: 2px 6px; border-radius: 4px; }
    .totp-code { font-family: monospace; font-size: 2rem; letter-spacing: 0.3em; color: #c8a951; }
    .totp-timer { font-size: 0.9rem; color: #a0a0c0; }
    .skill-icon { width: 20px; height: 20px; margin-right: 4px; }
    .stat-box { background: #0f3460; border-radius: 8px; padding: 12px 20px; text-align: center; }
    .stat-box .value { font-size: 1.5rem; font-weight: bold; color: #c8a951; }
    .stat-box .label { font-size: 0.8rem; color: #a0a0c0; }
    a { color: #c8a951; }
    a:hover { color: #e0bf60; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('accounts.dashboard') }}">
      <i class="bi bi-shield-fill-check"></i> OSRS Account Dashboard
    </a>
    <div class="ms-auto">
      <a href="{{ url_for('accounts.dashboard') }}" class="btn btn-sm btn-outline-warning me-2">
        <i class="bi bi-house"></i> Dashboard
      </a>
      <a href="{{ url_for('overview.financial_overview') }}" class="btn btn-sm btn-outline-info me-2">
        <i class="bi bi-cash-stack"></i> Overview
      </a>
      <a href="{{ url_for('accounts.add_account') }}" class="btn btn-sm btn-osrs">
        <i class="bi bi-plus-circle"></i> Add Account
      </a>
    </div>
  </div>
</nav>
<div class="container-fluid px-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
